<!DOCTYPE html>
<html>
<body>
<script>
class MyFunction extends Function {
    constructor() {
        super();
        super.prototype = 1; // destabilizes internal type
    }
}

function trigger() {
    for (let i = 0; i < 1000; i++) {
        const f = new MyFunction();
        try {
            f.__defineGetter__("prototype", () => {}); // throws
        } catch (e) {}
        try {
            f.prototype = {x: 1}; // keep it clean
        } catch (e) {}
    }

    alert("no crash yet");
}

trigger();
</script>
</body>
</html>
